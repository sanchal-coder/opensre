id: 700-pasted-self-improvement-offer
title: User pastes assistant-style self-improvement offer
intent_class: non_actionable
risk_level: low
input:
  prompt: If you want, I can patch the action planner so phrases like "switch my model
    to gpt-5.5" infer both provider+model automatically instead of misclassifying
    the model as a provider.
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store so the pasted blob hands off and the gather loop
  # has no tools regardless of the developer's local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands: []
  cli_commands: []
  synthetic_suites: []
notes:
- Prompt reads like the assistant offering a code change; nothing to execute.

route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: false
planned_actions: []
executed_actions: []
response_contract:
  must_contain_any: []
  must_not_contain:
  - $ /
gathered_tools_contract:
  # No integrations are resolved, so no remote-integration tool may fire.
  must_not_call:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
history:
  expected:
  - type: cli_agent
    ok: true
tier: full
runs: 3
