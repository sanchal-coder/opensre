id: 311-freeform-checkout-500-rich-context
title: Rich multi-line checkout API 500 incident with service, region, deploy context
intent_class: investigation
risk_level: medium
input:
  prompt: |
    Checkout API is returning HTTP 500s for 30% of requests since 14:05 UTC.
    Service: checkout-api
    Region: us-east-1
    Recent deploy at 14:00 UTC.
    Logs mention database connection timeout and pool exhausted.
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Force an empty resolved store so the gather loop has no tools regardless of
  # the developer's local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands: []
  cli_commands: []
  synthetic_suites: []
notes:
- "Reproduces the core paste-incident-description flow: rich multi-line alert with\
  \ service name, region, deploy time, and log symptoms. Without configured integrations\
  \ the agent must hand off to the assistant rather than blindly executing\
  \ opensre investigate --input-json with potentially malformed JSON."
- "Complements 307-new-alert-checkout-502 (single-line) by covering the structured\
  \ multi-line format users naturally paste from incident dashboards."
route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: incident_description:checkout_api_500_db_timeout
  source: llm
executed_actions: []
response_contract:
  must_contain_any: []
  must_not_contain:
  - $ /
gathered_tools_contract:
  # No integrations are resolved, so no remote-integration tool may fire.
  must_not_call:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
history:
  expected:
  - type: cli_agent
tier: full
runs: 3
