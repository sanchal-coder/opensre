id: 302-sample-alert-investigate-phrasing
title: Sample alert phrased as "investigate a sample test alert"
intent_class: investigation
risk_level: medium
input:
  prompt: investigate a sample test alert?
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store so this scenario is isolated from the developer's
  # local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands: []
  cli_commands: []
  synthetic_suites: []
notes:
- Regression for the "investigate a sample test alert?" phrasing. The verb
  "investigate" and the trailing "?" previously pushed this to the
  conversational assistant ("paste the alert text"). The LLM planner must
  recognize the "sample/test alert" noun phrase and emit the alert_sample tool
  with template=generic, not investigation_start or assistant_handoff.
route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: true
planned_actions:
- kind: sample_alert
  content: generic
  source: llm
  target_surface: investigation
  template: generic
executed_actions:
- kind: sample_alert
  template: generic
  content: generic
response_contract:
  must_contain_any:
  - sample alert generic
  must_not_contain: []
  forbidden_actions:
  - investigation
history:
  expected:
  - type: cli_agent
    ok: true
  - type: alert
    ok: true
tier: full
runs: 3
