id: 501-nitro-connect-then-investigate
title: Nitro connect then investigate
intent_class: remote
risk_level: high
input:
  prompt: run /remote and then investigate "hello world"
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store for environment isolation so the planned/executed
  # action sequence does not depend on the developer's local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands:
  - /remote
  cli_commands: []
  synthetic_suites: []
notes: []

route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: true
planned_actions:
- kind: slash
  content: /remote
  source: llm
  target_surface: slash
  command: /remote
  args: &id001 []
- kind: investigation
  content: hello world
  source: llm
  target_surface: investigation
executed_actions:
- kind: slash
  command: /remote
  args: *id001
  content: /remote
- kind: investigation
  content: hello world
response_contract:
  must_contain_any:
  - ran /remote
  must_not_contain: []
history:
  expected:
  - type: cli_agent
    ok: true
  - type: slash
    ok: true
  - type: alert
    ok: true
tier: critical
runs: 3
