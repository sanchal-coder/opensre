id: 500-connect-local-llama-fail-closed
title: Connect local llama fail-closed
intent_class: remote
risk_level: medium
input:
  prompt: please connect to local llama
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store so the vague provider request hands off and the
  # gather loop has no tools regardless of the developer's local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands: []
  cli_commands: []
  synthetic_suites: []
notes: []

route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: false
planned_actions: []
executed_actions: []
response_contract:
  must_contain_any:
  - local llama
  - provider
  - /model set
  - local-model connection tool
  must_not_contain:
  - $ /
gathered_tools_contract:
  # No integrations are resolved, so no remote-integration tool may fire.
  must_not_call:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
history:
  expected:
  - type: cli_agent
    ok: true
tier: critical
runs: 3
