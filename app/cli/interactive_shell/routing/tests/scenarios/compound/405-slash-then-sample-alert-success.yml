id: 405-slash-then-sample-alert-success
title: Health check slash followed by sample alert investigation, both execute
intent_class: compound
risk_level: medium
input:
  prompt: run /health and then trigger a sample alert investigation
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store for environment isolation so the planned/executed
  # action sequence does not depend on the developer's local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands:
  - /health
  cli_commands: []
  synthetic_suites: []
notes:
- Both actions are valid and of compatible kinds. Verifies that a compound request
  with two supported sequential actions executes successfully without fail-closing.

route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: true
planned_actions:
- kind: slash
  content: /health
  source: llm
  target_surface: slash
  command: /health
  args: []
- kind: sample_alert
  content: generic
  source: llm
  target_surface: investigation
  template: generic
executed_actions:
- kind: slash
  command: /health
  args: []
  content: /health
- kind: sample_alert
  template: generic
  content: generic
response_contract:
  must_contain_any:
  - ran /health
  must_not_contain: []
history:
  expected:
  - type: cli_agent
    ok: true
  - type: slash
    ok: true
  - type: alert
    ok: true
tier: critical
runs: 3
