id: 406-slash-then-investigate-sample-alert
title: Health check slash followed by "investigate a sample test alert"
intent_class: compound
risk_level: medium
input:
  prompt: run /health and then investigate a sample test alert
  surface: interactive_cli
session:
  has_prior_state: false
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store for environment isolation so the planned/executed
  # action sequence does not depend on the developer's local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands:
  - /health
  cli_commands: []
  synthetic_suites: []
notes:
- Sibling of 405 using the "investigate a sample test alert" phrasing. Verifies
  the sample alert is fired as its OWN alert_sample tool call (a separate tool
  from /health), even though the clause leads with the verb "investigate". The
  sample alert must be LLM-decided, not folded into investigation_start.

route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: true
planned_actions:
- kind: slash
  content: /health
  source: llm
  target_surface: slash
  command: /health
  args: []
- kind: sample_alert
  content: generic
  source: llm
  target_surface: investigation
  template: generic
executed_actions:
- kind: slash
  command: /health
  args: []
  content: /health
- kind: sample_alert
  template: generic
  content: generic
response_contract:
  must_contain_any:
  - ran /health
  must_not_contain: []
  forbidden_actions:
  - investigation
history:
  expected:
  - type: cli_agent
    ok: true
  - type: slash
    ok: true
  - type: alert
    ok: true
tier: critical
runs: 3
