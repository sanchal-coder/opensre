id: 600-follow-up-why-failed
title: Follow-up why failed
intent_class: follow_up
risk_level: medium
input:
  prompt: why did it fail?
  surface: interactive_cli
session:
  has_prior_state: true
  remote_connected: false
  configured_integrations: []
  # Pin an empty resolved store so the follow-up is answered from prior context
  # only -- the gather loop has no tools regardless of local ~/.opensre integrations.
  resolved_integrations: {}
available_capabilities:
  slash_commands: []
  cli_commands: []
  synthetic_suites: []
notes: []

route:
  expected_kind: handle_message_with_agent
  expected_command_text: null
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: follow_up:last_failure
  source: llm
executed_actions: []
response_contract:
  must_contain_any:
  - why did it fail
  - follow-up
  - alert text
  must_not_contain:
  - $ /
gathered_tools_contract:
  # No integrations are resolved, so no remote-integration tool may fire.
  must_not_call:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
history:
  expected:
  - type: cli_agent
    ok: true
tier: full
runs: 3
